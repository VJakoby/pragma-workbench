name: pragma-workbench
services:
  app:
    build:
      context: .
      args:
        INSTALL_CHROMIUM: ${PDF_EXPORT_ENABLED:-true}       # Build-time choice derived from PDF export setting; rebuild after changing PDF_EXPORT_ENABLED
    container_name: pragma-workbench
    user: "${PRAGMA_UID:-1000}:${PRAGMA_GID:-1000}"
    ports:
      - "127.0.0.1:3000:3000"                               # App only accessible from local machine
    volumes:
      # Format: [Host Path]:[Container Path]
      - ./server:/usr/src/app/server                                 # Use checked-out backend code without rebuilding the image
      - ./public:/usr/src/app/public                                 # Use checked-out frontend assets without rebuilding the image
      - ./views:/usr/src/app/views                                   # Use checked-out EJS templates without rebuilding the image
      - ./server.js:/usr/src/app/server.js                           # Keep the runtime entrypoint aligned with the current checkout
      - ./note-templates.json:/usr/src/app/note-templates.json       # Keep checked-in templates aligned with the current checkout
      - ${PRAGMA_KB_PATH:-./knowledge-base}:/usr/src/app/knowledge-base   # Link local KB folder to the container's app path
      - ${PRAGMA_SESSIONS_PATH:-./sessions}:/usr/src/app/sessions         # Keeps session data alive even if the container is deleted
    environment:
      # IMPORTANT: These must point to the 'Container Path' defined in the volumes above.
      - HOST=0.0.0.0                                         # Container must bind all interfaces so published port 127.0.0.1:3000 works from the host
      - KB_DIR=/usr/src/app/knowledge-base                   # The root directory for your Knowledge Base
      - SESSIONS_DIR=/usr/src/app/sessions                   # Where the app stores active/saved session state
      - SEARCH_URL=${SEARCH_URL:-http://engram:3002}         # ENGRAM is external to this compose file and must already be reachable on pragma-net as 'engram:3002'
      - ENGRAM_SEARCH_ENABLED=${ENGRAM_SEARCH_ENABLED:-true} # Toggle the ENGRAM search UI and proxy routes
      - TOOLBOX_ENABLED=${TOOLBOX_ENABLED:-false}            # Enable the optional PRAGMA // Toolbox integration only when it is deployed for this PRAGMA instance
      - TOOLBOX_URL=${TOOLBOX_URL:-http://host.docker.internal:3003} # PRAGMA // Toolbox is expected to run outside this compose stack and be reachable from the PRAGMA container when TOOLBOX_ENABLED=true
      - TOOLBOX_URLS=${TOOLBOX_URLS:-http://host.docker.internal:3003} # Optional fallback Toolbox URLs tried in order
      - PDF_EXPORT_ENABLED=${PDF_EXPORT_ENABLED:-true}      # Runtime choice: false disables PDF export and should be paired with a rebuild to omit Chromium
    restart: unless-stopped
    networks:
      - pragma-net
    extra_hosts:
      - "host.docker.internal:host-gateway"                  # Linux host-gateway mapping so PRAGMA can reach host-side PRAGMA // Toolbox on port 3003
    # ── Security hardening ──────────────────────────────────────────────────
    tmpfs:
      - /tmp                                                 # Node/Express needs a writable /tmp
    cap_drop:
      - ALL                                                  # Drop all Linux capabilities
    security_opt:
      - no-new-privileges:true                               # Prevent privilege escalation
    # ── Resource limits ─────────────────────────────────────────────────────
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.50'
networks:
  pragma-net:
    driver: bridge
    name: pragma-net                                         # Shared bridge network for PRAGMA plus an externally managed ENGRAM container
