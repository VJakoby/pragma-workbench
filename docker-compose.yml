services:
  aegistrace-app:
    build: .
    container_name: aegistrace_core
    ports:
      - "8501:8501"
    volumes:
      - ./knowledge_base:/app/knowledge_base
      - ./scans:/app/scans
    environment:
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_THEME_BASE=dark  # Force dark mode 
    restart: unless-stopped