<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PKBI Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:        #080c10;
      --bg2:       #0d1219;
      --bg3:       #131b24;
      --border:    #1e2d3d;
      --border2:   #2a3f55;
      --text:      #cdd6f4;
      --muted:     #6b7c93;
      --accent:    #4fc3f7;
      --accent2:   #00e5ff;
      --green:     #00e676;
      --purple:    #b388ff;
      --red:       #ff5370;
      --orange:    #ffab40;
      --yellow:    #ffeb3b;
    }

    body {
      font-family: 'Syne', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Scanline overlay ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.03) 2px,
        rgba(0,0,0,0.03) 4px
      );
      pointer-events: none;
      z-index: 9999;
    }

    /* ── Top bar ── */
    .topbar {
      position: sticky; top: 0; z-index: 100;
      background: rgba(8,12,16,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      height: 58px;
    }

    .topbar-logo {
      display: flex; align-items: center; gap: 10px;
      font-weight: 800; font-size: 20px; letter-spacing: 0.08em;
      color: var(--accent2);
      text-shadow: 0 0 16px rgba(0,229,255,0.4);
      font-family: 'JetBrains Mono', monospace;
    }
    .topbar-logo span { color: var(--muted); font-size: 13px; font-weight: 400; }

    /* Quick search */
    .search-area {
      display: flex; align-items: center; gap: 8px;
      flex: 0 1 500px;
    }

    .search-scope-btns {
      display: flex; border-radius: 7px; overflow: hidden;
      border: 1px solid var(--border2); flex-shrink: 0;
    }
    .scope-btn {
      background: var(--bg3); border: none; color: var(--muted);
      padding: 6px 12px; font-size: 11px; font-weight: 600;
      cursor: pointer; transition: all 0.15s;
      font-family: 'JetBrains Mono', monospace; letter-spacing: 0.04em;
    }
    .scope-btn:not(:last-child) { border-right: 1px solid var(--border); }
    .scope-btn.active { background: var(--accent); color: #000; }
    .scope-btn:not(.active):hover { background: var(--border2); color: var(--text); }

    .search-wrap {
      position: relative; flex: 1;
    }
    .search-icon {
      position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
      color: var(--muted); font-size: 14px; pointer-events: none;
    }
    .quick-search {
      width: 100%;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      padding: 7px 12px 7px 32px;
      font-size: 13px;
      font-family: 'JetBrains Mono', monospace;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .quick-search:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(79,195,247,0.12);
    }
    .quick-search::placeholder { color: var(--muted); }

    .search-kbd {
      position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
      background: var(--bg); border: 1px solid var(--border2);
      border-radius: 4px; padding: 2px 6px;
      font-size: 10px; color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
    }

    .search-placeholder-pill {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--bg3); border: 1px dashed var(--border2);
      border-radius: 6px; padding: 5px 12px;
      font-size: 11px; color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
    }

    /* ── Main layout ── */
    .main {
      padding: 32px 28px;
      max-width: 1600px; margin: 0 auto;
    }

    .section-header {
      display: flex; align-items: baseline; gap: 12px;
      margin-bottom: 20px;
    }
    .section-title {
      font-size: 11px; font-weight: 700; letter-spacing: 0.18em;
      text-transform: uppercase; color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
    }
    .section-line {
      flex: 1; height: 1px; background: var(--border);
    }
    .section-count {
      font-size: 11px; color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
    }

    /* Filter bar */
    .filter-bar {
      display: flex; gap: 8px; margin-bottom: 28px; flex-wrap: wrap;
    }
    .filter-tag {
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: 5px; padding: 5px 14px;
      font-size: 12px; color: var(--muted); cursor: pointer;
      transition: all 0.15s; font-family: 'JetBrains Mono', monospace;
      letter-spacing: 0.04em;
    }
    .filter-tag.active { background: var(--accent); border-color: var(--accent); color: #000; }
    .filter-tag:not(.active):hover { border-color: var(--border2); color: var(--text); }

    /* ── Service Grid ── */
    .services-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 14px;
    }

    .service-card {
      position: relative;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px;
      cursor: pointer;
      transition: border-color 0.2s, transform 0.18s, box-shadow 0.2s;
      overflow: hidden;
      user-select: none;
    }
    .service-card::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at 20% 0%, rgba(79,195,247,0.06) 0%, transparent 60%);
      opacity: 0; transition: opacity 0.2s;
    }
    .service-card:hover {
      border-color: var(--accent);
      transform: translateY(-3px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.4), 0 0 0 1px rgba(79,195,247,0.15);
    }
    .service-card:hover::before { opacity: 1; }
    .service-card:active { transform: translateY(-1px); }

    /* colored top stripe */
    .service-card::after {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: var(--card-accent, var(--accent));
      opacity: 0.7;
      transition: opacity 0.2s;
    }
    .service-card:hover::after { opacity: 1; }

    .card-icon {
      font-size: 28px; margin-bottom: 10px;
      display: block; line-height: 1;
    }
    .card-port {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px; color: var(--muted);
      margin-bottom: 6px; letter-spacing: 0.06em;
    }
    .card-name {
      font-size: 15px; font-weight: 700; color: var(--text);
      margin-bottom: 4px;
    }
    .card-desc {
      font-size: 11px; color: var(--muted); line-height: 1.5;
    }
    .card-tag {
      display: inline-block; margin-top: 10px;
      background: rgba(79,195,247,0.1); border: 1px solid rgba(79,195,247,0.2);
      border-radius: 3px; padding: 2px 7px;
      font-size: 10px; color: var(--accent);
      font-family: 'JetBrains Mono', monospace; letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    /* card highlight on search match */
    .service-card.search-match {
      border-color: var(--yellow);
      box-shadow: 0 0 0 1px rgba(255,235,59,0.25);
    }
    .service-card.search-match::after { background: var(--yellow); opacity: 1; }

    .service-card.hidden { display: none; }

    /* ── Modal ── */
    .modal-overlay {
      display: none; position: fixed; inset: 0; z-index: 500;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(4px);
      animation: fadeIn 0.15s;
      align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    .modal-box {
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: 14px;
      width: 90%; max-width: 820px;
      max-height: 88vh;
      display: flex; flex-direction: column;
      animation: slideUp 0.2s;
      box-shadow: 0 24px 80px rgba(0,0,0,0.6);
      overflow: hidden;
    }

    .modal-head {
      padding: 18px 24px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 14px;
    }
    .modal-icon { font-size: 26px; }
    .modal-head-info { flex: 1; }
    .modal-title { font-size: 18px; font-weight: 700; color: var(--text); }
    .modal-meta {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px; color: var(--muted); margin-top: 2px;
    }
    .modal-close-btn {
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: 7px; color: var(--muted);
      padding: 6px 12px; font-size: 13px; cursor: pointer;
      transition: all 0.15s;
    }
    .modal-close-btn:hover { background: var(--border2); color: var(--text); }

    .modal-body {
      padding: 24px 28px;
      overflow-y: auto; flex: 1;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px; line-height: 1.75;
    }

    /* Markdown rendering */
    .md h1 { color: var(--accent2); font-size: 1.4em; margin: 0 0 14px; font-family: 'Syne', sans-serif; font-weight: 800;
              border-bottom: 1px solid var(--border); padding-bottom: 8px; }
    .md h2 { color: var(--accent); font-size: 1.1em; margin: 20px 0 8px; font-family: 'Syne', sans-serif; font-weight: 700; }
    .md h3 { color: var(--purple); font-size: 1em; margin: 14px 0 6px; font-family: 'Syne', sans-serif; font-weight: 700; }
    .md p { margin-bottom: 10px; color: var(--text); }
    .md code {
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: 4px; padding: 1px 6px;
      color: var(--green); font-size: 0.92em;
    }
    .md pre {
      background: var(--bg); border: 1px solid var(--border2);
      border-radius: 8px; padding: 14px 16px;
      overflow-x: auto; margin: 12px 0;
      position: relative;
    }
    .md pre code {
      background: none; border: none; padding: 0;
      color: var(--green); font-size: 12px; display: block;
    }
    .md ul, .md ol { padding-left: 20px; margin-bottom: 10px; }
    .md li { margin-bottom: 4px; color: var(--text); }
    .md li::marker { color: var(--accent); }
    .md strong { color: var(--accent2); font-weight: 700; }
    .md em { color: var(--orange); }
    .md a { color: var(--accent); text-decoration: none; }
    .md a:hover { text-decoration: underline; }
    .md blockquote {
      border-left: 3px solid var(--accent); padding-left: 14px;
      margin: 10px 0; color: var(--muted);
    }
    .md hr { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
    .md table { border-collapse: collapse; width: 100%; margin: 12px 0; font-size: 12px; }
    .md th { background: var(--bg3); color: var(--accent); padding: 6px 12px; border: 1px solid var(--border); text-align: left; }
    .md td { padding: 6px 12px; border: 1px solid var(--border); color: var(--text); }

    .modal-footer {
      padding: 14px 24px;
      border-top: 1px solid var(--border);
      display: flex; gap: 10px; justify-content: flex-end;
      align-items: center;
    }
    .modal-footer-left { flex: 1; font-size: 11px; color: var(--muted); font-family: 'JetBrains Mono', monospace; }
    .btn {
      padding: 7px 16px; border-radius: 6px; border: none;
      font-size: 12px; font-weight: 600; cursor: pointer;
      transition: all 0.15s; font-family: 'Syne', sans-serif;
    }
    .btn-primary { background: var(--accent); color: #000; }
    .btn-primary:hover { background: var(--accent2); }
    .btn-secondary { background: var(--bg3); border: 1px solid var(--border); color: var(--text); }
    .btn-secondary:hover { border-color: var(--border2); }

    /* Stats row */
    .stats-row {
      display: flex; gap: 20px; margin-bottom: 32px;
      flex-wrap: wrap;
    }
    .stat-pill {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 8px; padding: 10px 18px;
      display: flex; align-items: center; gap: 10px;
    }
    .stat-pill-val {
      font-family: 'JetBrains Mono', monospace;
      font-size: 20px; font-weight: 700; color: var(--accent2);
    }
    .stat-pill-label { font-size: 12px; color: var(--muted); }

    /* search highlight badge */
    .search-results-badge {
      background: rgba(255,235,59,0.12); border: 1px solid rgba(255,235,59,0.3);
      border-radius: 5px; padding: 5px 14px;
      font-size: 12px; color: var(--yellow);
      font-family: 'JetBrains Mono', monospace;
      display: none;
    }
    .search-results-badge.visible { display: inline-block; }

    @media (max-width: 640px) {
      .topbar { flex-direction: column; height: auto; padding: 10px 16px; gap: 8px; }
      .search-area { width: 100%; flex: none; }
      .main { padding: 16px; }
    }
  </style>
</head>
<body>

<!-- Top Bar -->
<div class="topbar">
  <div class="topbar-logo">
    📖 PKBI <span>/ dashboard</span>
  </div>

  <div class="search-area">
    <!-- Scope selector -->
    <div class="search-scope-btns">
      <button class="scope-btn active" data-scope="local" onclick="setScope('local', this)" title="Search local knowledge base">📁 Local</button>
      <button class="scope-btn" data-scope="online" onclick="setScope('online', this)" title="Search online (coming soon)">🌐 Online</button>
      <button class="scope-btn" data-scope="all" onclick="setScope('all', this)" title="Search everything (coming soon)">✦ All</button>
    </div>

    <!-- Input -->
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input class="quick-search" id="quickSearch" type="text"
             placeholder="Quick search services…" autocomplete="off"
             oninput="onQuickSearch(this.value)">
      <span class="search-kbd">⌘K</span>
    </div>
  </div>
</div>

<!-- Main -->
<div class="main">

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-pill">
      <div class="stat-pill-val" id="statTotal">0</div>
      <div class="stat-pill-label">Services indexed</div>
    </div>
    <div class="stat-pill">
      <div class="stat-pill-val" id="statCats">0</div>
      <div class="stat-pill-label">Categories</div>
    </div>
    <div class="stat-pill" style="border-color: rgba(0,230,118,0.3);">
      <div class="stat-pill-val" style="color: var(--green);">Local</div>
      <div class="stat-pill-label">Knowledge base</div>
    </div>

    <span class="search-results-badge" id="searchBadge"></span>
  </div>

  <!-- Filter bar -->
  <div class="section-header">
    <span class="section-title">Services</span>
    <div class="section-line"></div>
    <span class="section-count" id="visibleCount">—</span>
  </div>

  <div class="filter-bar" id="filterBar">
    <button class="filter-tag active" data-cat="all" onclick="filterBy('all', this)">All</button>
  </div>

  <!-- Grid -->
  <div class="services-grid" id="servicesGrid"></div>

</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal-box">
    <div class="modal-head">
      <span class="modal-icon" id="modalIcon">📄</span>
      <div class="modal-head-info">
        <div class="modal-title" id="modalTitle">Loading…</div>
        <div class="modal-meta" id="modalMeta"></div>
      </div>
      <button class="modal-close-btn" onclick="closeModalDirect()">✕ Close</button>
    </div>
    <div class="modal-body">
      <div class="md" id="modalContent">Loading…</div>
    </div>
    <div class="modal-footer">
      <div class="modal-footer-left" id="modalFile"></div>
      <button class="btn btn-secondary" onclick="closeModalDirect()">Close</button>
      <button class="btn btn-primary" id="modalOpenBtn">Open in PKBI →</button>
    </div>
  </div>
</div>

<script>
// ────────────────────────────────────────────────
// SERVICES is loaded from /api/services at runtime
// ────────────────────────────────────────────────
let SERVICES = [];

// ────────────────────────────────────────────────
// State
// ────────────────────────────────────────────────
let activeCategory = 'all';
let activeScope    = 'local';
let searchQuery    = '';

// Accent colours cycled for cards that don't have one from the server
const ACCENT_CYCLE = [
  '#4fc3f7','#00e676','#ffab40','#b388ff',
  '#ff5370','#ffeb3b','#00e5ff','#69f0ae',
];
function accentFor(index) { return ACCENT_CYCLE[index % ACCENT_CYCLE.length]; }

// ────────────────────────────────────────────────
// Init — fetch from API
// ────────────────────────────────────────────────
async function init() {
  try {
    const res  = await fetch('/api/services');
    const data = await res.json();
    SERVICES   = data.services || [];
  } catch (err) {
    console.error('Failed to load /api/services:', err);
    showError('Could not reach the server. Is it running?');
    return;
  }

  if (SERVICES.length === 0) {
    showError('No .md files found in knowledge_base/. Add some and restart the server.');
    return;
  }

  // Build category filter buttons
  const cats = ['all', ...new Set(SERVICES.map(s => s.category))];
  const fb   = document.getElementById('filterBar');
  fb.innerHTML = '';
  cats.forEach(cat => {
    const b = document.createElement('button');
    b.className   = 'filter-tag' + (cat === 'all' ? ' active' : '');
    b.dataset.cat = cat;
    b.textContent = cat === 'all' ? 'All' : cat;
    b.onclick     = () => filterBy(cat, b);
    fb.appendChild(b);
  });

  // Stats
  document.getElementById('statTotal').textContent = SERVICES.length;
  document.getElementById('statCats').textContent  = cats.length - 1;

  renderGrid();
}

function showError(msg) {
  document.getElementById('servicesGrid').innerHTML =
    `<div style="grid-column:1/-1;color:var(--red);font-family:'JetBrains Mono',monospace;
      font-size:13px;padding:40px 0;text-align:center;">⚠️  ${msg}</div>`;
}

// ────────────────────────────────────────────────
// Render grid
// ────────────────────────────────────────────────
function renderGrid() {
  const grid = document.getElementById('servicesGrid');
  grid.innerHTML = '';
  let visible = 0;
  const q = searchQuery.toLowerCase();

  SERVICES.forEach((svc, idx) => {
    const matchesCat    = activeCategory === 'all' || svc.category === activeCategory;
    const matchesSearch = !q ||
      svc.name.toLowerCase().includes(q) ||
      (svc.description || '').toLowerCase().includes(q) ||
      svc.category.toLowerCase().includes(q) ||
      svc.port.toLowerCase().includes(q);

    const accent = accentFor(idx);
    const card   = document.createElement('div');
    card.className = 'service-card' +
      (!matchesCat || !matchesSearch ? ' hidden' : '') +
      (matchesSearch && q ? ' search-match' : '');
    card.style.setProperty('--card-accent', accent);
    card.dataset.id = svc.id;
    card.innerHTML  = `
      <span class="card-icon">${svc.icon || '📄'}</span>
      <div class="card-port">${svc.port || '—'}</div>
      <div class="card-name">${esc(svc.name)}</div>
      <div class="card-desc">${esc(svc.description || '')}</div>
      <span class="card-tag">${esc(svc.category)}</span>
    `;
    card.onclick = () => openModal(svc.id);
    grid.appendChild(card);
    if (matchesCat && matchesSearch) visible++;
  });

  document.getElementById('visibleCount').textContent = `${visible} service${visible !== 1 ? 's' : ''}`;

  const badge = document.getElementById('searchBadge');
  if (q && visible < SERVICES.length) {
    badge.textContent = `🔍 ${visible} match${visible !== 1 ? 'es' : ''} for "${searchQuery}"`;
    badge.classList.add('visible');
  } else {
    badge.classList.remove('visible');
  }
}

function filterBy(cat, btn) {
  activeCategory = cat;
  document.querySelectorAll('.filter-tag').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderGrid();
}

function setScope(scope, btn) {
  activeScope = scope;
  document.querySelectorAll('.scope-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const input = document.getElementById('quickSearch');
  if (scope === 'online') input.placeholder = '🌐 Online search coming soon…';
  else if (scope === 'all') input.placeholder = '✦ All-source search coming soon…';
  else input.placeholder = 'Quick search services…';
}

function onQuickSearch(val) {
  searchQuery = val;
  renderGrid();
}

// ────────────────────────────────────────────────
// Modal — fetches full content from /api/service/:id
// ────────────────────────────────────────────────
async function openModal(id) {
  const svc = SERVICES.find(s => s.id === id);
  if (!svc) return;

  // Show modal immediately with loading state
  document.getElementById('modalIcon').textContent    = svc.icon || '📄';
  document.getElementById('modalTitle').textContent   = svc.name;
  document.getElementById('modalMeta').textContent    = `Port: ${svc.port}  ·  Category: ${svc.category}`;
  document.getElementById('modalFile').textContent    = `📁 knowledge_base/${svc.file}`;
  document.getElementById('modalContent').innerHTML   =
    `<p style="color:var(--muted);text-align:center;padding:40px 0;">Loading…</p>`;
  document.getElementById('modalOpenBtn').onclick     = () => window.open('/search?q=' + encodeURIComponent(svc.name), '_blank');
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';

  // Fetch rendered HTML from server (uses marked on the server side)
  try {
    const res  = await fetch(`/api/service/${encodeURIComponent(id)}`);
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    document.getElementById('modalContent').innerHTML = data.html;
  } catch (err) {
    document.getElementById('modalContent').innerHTML =
      `<p style="color:var(--red);">Failed to load content: ${err.message}</p>`;
  }
}

function closeModal(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModalDirect();
}
function closeModalDirect() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

// ────────────────────────────────────────────────
// Utility
// ────────────────────────────────────────────────
function esc(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ────────────────────────────────────────────────
// Keyboard shortcuts
// ────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if (document.getElementById('modalOverlay').classList.contains('open')) {
      closeModalDirect(); return;
    }
    document.getElementById('quickSearch').value = '';
    searchQuery = '';
    renderGrid();
    return;
  }
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
    e.preventDefault();
    document.getElementById('quickSearch').focus();
  }
});

init();
</script>
</body>
</html>
