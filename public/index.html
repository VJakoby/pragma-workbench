<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Methodology Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #21252b;
      --bg2: #282c34;
      --bg3: #30353f;
      --border: #3e4451;
      --border2: #4b5263;
      --text: #abb2bf;
      --text2: #9da5b4;
      --muted: #636d83;
      --accent: #61afef;
      --accent2: #56b6c2;
      --green: #98c379;
      --purple: #c678dd;
      --red: #e06c75;
      --orange: #d19a66;
      --yellow: #e5c07b;
      --topbar-bg: rgba(33, 37, 43, 0.94);
      --logo-purple: #7c3aed;
    }

    [data-theme="light"] {
      --bg: #f0f4f8;
      --bg2: #ffffff;
      --bg3: #e8edf3;
      --border: #d0dae6;
      --border2: #b8c6d6;
      --text: #1a2535;
      --text2: #3d5166;
      --muted: #7a8fa3;
      --accent: #0288d1;
      --accent2: #0097a7;
      --green: #00897b;
      --purple: #7b1fa2;
      --red: #c62828;
      --orange: #e65100;
      --yellow: #f57f17;
      --topbar-bg: rgba(240, 244, 248, 0.95);
      --logo-purple: #4c1d95;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      transition: background 0.2s, color 0.2s;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Scanline overlay ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(0deg,
          transparent,
          transparent 2px,
          rgba(0, 0, 0, 0.02) 2px,
          rgba(0, 0, 0, 0.02) 4px);
      pointer-events: none;
      z-index: 9999;
    }

    [data-theme="light"] body::before {
      opacity: 0.3;
    }

    /* ── Top bar — taller to accommodate two-row search ── */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--topbar-bg);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 28px;
      min-height: 72px;
      gap: 16px;
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }

    .topbar-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 800;
      font-size: 20px;
      letter-spacing: 0.08em;
      color: var(--logo-purple);
      text-shadow: 0 0 20px rgba(124, 58, 237, 0.15);
      font-family: 'JetBrains Mono', monospace;
    }

    .topbar-logo span {
      color: var(--muted);
      font-size: 13px;
      font-weight: 400;
    }

    .theme-btn {
      background: var(--bg3);
      border: 1px solid var(--border2);
      border-radius: 7px;
      color: var(--muted);
      padding: 5px 10px;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.15s;
      line-height: 1;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .theme-btn:hover {
      border-color: var(--accent);
      color: var(--text);
    }

    .theme-btn-label {
      font-size: 11px;
      font-family: 'JetBrains Mono', monospace;
      font-weight: 600;
    }

    /* Quick search */
    .search-area {
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex: 0 1 580px;
    }

    .search-wrap {
      position: relative;
    }

    .search-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 15px;
      pointer-events: none;
    }

    .quick-search {
      width: 100%;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 9px 70px 9px 38px;
      font-size: 14px;
      font-family: 'JetBrains Mono', monospace;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .quick-search:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(79, 195, 247, 0.12);
    }

    .quick-search::placeholder {
      color: var(--muted);
    }

    .search-kbd {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: var(--bg);
      border: 1px solid var(--border2);
      border-radius: 4px;
      padding: 2px 7px;
      font-size: 10px;
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
    }

    /* Search controls row — scope + fuzzy */
    .search-controls {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .search-scope-btns {
      display: flex;
      border-radius: 6px;
      overflow: hidden;
      border: 1px solid var(--border2);
      flex-shrink: 0;
    }

    .scope-btn {
      background: var(--bg3);
      border: none;
      color: var(--muted);
      padding: 4px 10px;
      font-size: 10px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 0.04em;
    }

    .scope-btn:not(:last-child) {
      border-right: 1px solid var(--border);
    }

    .scope-btn.active {
      background: var(--accent);
      color: #000;
    }

    .scope-btn:not(.active):hover {
      background: var(--border2);
      color: var(--text);
    }

    .search-divider-dot {
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: var(--border2);
      flex-shrink: 0;
    }

    .fuzzy-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      flex-shrink: 0;
    }

    .fuzzy-btns {
      display: flex;
      border-radius: 6px;
      overflow: hidden;
      border: 1px solid var(--border2);
      flex-shrink: 0;
    }

    .fuzzy-btn {
      background: var(--bg3);
      border: none;
      color: var(--muted);
      padding: 4px 10px;
      font-size: 10px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 0.04em;
    }

    .fuzzy-btn:not(:last-child) {
      border-right: 1px solid var(--border);
    }

    .fuzzy-btn.active {
      background: var(--purple);
      color: #fff;
    }

    .fuzzy-btn:not(.active):hover {
      background: var(--border2);
      color: var(--text);
    }

    /* ── Main layout ── */
    .main {
      padding: 32px 28px;
      max-width: 1600px;
      margin: 0 auto;
    }

    .section-header {
      display: flex;
      align-items: baseline;
      gap: 12px;
      margin-bottom: 20px;
    }

    .section-title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
    }

    .section-line {
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .section-count {
      font-size: 11px;
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
    }

    /* Filter bar */
    .filter-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }

    .filter-tag {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 5px 14px;
      font-size: 12px;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 0.04em;
    }

    .filter-tag.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #000;
    }

    .filter-tag:not(.active):hover {
      border-color: var(--border2);
      color: var(--text);
    }

    /* ── Service Grid ── */
    .services-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 14px;
    }

    .service-card {
      position: relative;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px;
      cursor: pointer;
      transition: border-color 0.2s, transform 0.18s, box-shadow 0.2s;
      overflow: hidden;
      user-select: none;
    }

    .service-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 20% 0%, rgba(79, 195, 247, 0.06) 0%, transparent 60%);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .service-card:hover {
      border-color: var(--accent);
      transform: translateY(-3px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(79, 195, 247, 0.15);
    }

    .service-card:hover::before {
      opacity: 1;
    }

    .service-card:active {
      transform: translateY(-1px);
    }

    /* colored top stripe */
    .service-card::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: var(--card-accent, var(--accent));
      opacity: 0.7;
      transition: opacity 0.2s;
    }

    .service-card:hover::after {
      opacity: 1;
    }

    .card-icon {
      font-size: 28px;
      margin-bottom: 10px;
      display: block;
      line-height: 1;
    }

    .card-port {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      margin-bottom: 6px;
      letter-spacing: 0.06em;
    }

    .card-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 5px;
      letter-spacing: 0.01em;
    }

    .card-desc {
      font-size: 12px;
      color: var(--text2);
      line-height: 1.55;
    }

    .card-tag {
      display: inline-block;
      margin-top: 10px;
      background: rgba(79, 195, 247, 0.1);
      border: 1px solid rgba(79, 195, 247, 0.2);
      border-radius: 3px;
      padding: 2px 7px;
      font-size: 10px;
      color: var(--accent);
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    /* card highlight on search match */
    .service-card.search-match {
      border-color: var(--yellow);
      box-shadow: 0 0 0 1px rgba(255, 235, 59, 0.25);
    }

    .service-card.search-match::after {
      background: var(--yellow);
      opacity: 1;
    }

    .service-card.hidden {
      display: none;
    }

    /* ── Modal ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 500;
      background: rgba(0, 0, 0, 0.75);
      backdrop-filter: blur(4px);
      animation: fadeIn 0.15s;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.open {
      display: flex;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .modal-box {
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: 14px;
      width: 92%;
      max-width: 1100px;
      max-height: 88vh;
      display: flex;
      flex-direction: column;
      animation: slideUp 0.2s;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.6);
      overflow: hidden;
    }

    .modal-head {
      padding: 18px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .modal-icon {
      font-size: 26px;
    }

    .modal-head-info {
      flex: 1;
    }

    .modal-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
    }

    .modal-meta {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
    }

    .modal-close-btn {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--muted);
      padding: 6px 12px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .modal-close-btn:hover {
      background: var(--border2);
      color: var(--text);
    }

    .modal-body {
      padding: 24px 28px;
      overflow-y: auto;
      flex: 1;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      line-height: 1.75;
    }

    /* Markdown rendering */
    .md {
      font-size: 14px;
      line-height: 1.75;
    }

    .md h1 {
      color: var(--accent2);
      font-size: 1.5em;
      margin: 0 0 16px;
      font-family: 'Inter', system-ui, sans-serif;
      font-weight: 800;
      border-bottom: 1px solid var(--border);
      padding-bottom: 10px;
      letter-spacing: 0.01em;
    }

    .md h2 {
      color: var(--accent);
      font-size: 1.15em;
      margin: 24px 0 10px;
      font-family: 'Inter', system-ui, sans-serif;
      font-weight: 700;
    }

    .md h3 {
      color: var(--purple);
      font-size: 1em;
      margin: 16px 0 8px;
      font-family: 'Inter', system-ui, sans-serif;
      font-weight: 700;
    }

    .md p {
      margin-bottom: 12px;
      color: var(--text2);
    }

    .md code {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2px 6px;
      color: var(--green);
      font-size: 0.88em;
    }

    .md pre {
      background: var(--bg);
      border: 1px solid var(--border2);
      border-radius: 8px;
      padding: 16px 18px;
      overflow-x: auto;
      margin: 14px 0;
      position: relative;
    }

    .md pre code {
      background: none;
      border: none;
      padding: 0;
      color: var(--green);
      font-size: 12.5px;
      line-height: 1.65;
      display: block;
    }

    .md ul,
    .md ol {
      padding-left: 22px;
      margin-bottom: 12px;
    }

    .md li {
      margin-bottom: 5px;
      color: var(--text2);
    }

    .md li::marker {
      color: var(--accent);
    }

    .md strong {
      color: var(--text);
      font-weight: 700;
    }

    .md em {
      color: var(--orange);
    }

    .md a {
      color: var(--accent);
      text-decoration: none;
    }

    .md a:hover {
      text-decoration: underline;
    }

    .md blockquote {
      border-left: 3px solid var(--accent);
      padding-left: 16px;
      margin: 12px 0;
      color: var(--muted);
    }

    .md hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 20px 0;
    }

    .md table {
      border-collapse: collapse;
      width: 100%;
      margin: 14px 0;
      font-size: 13px;
    }

    .md th {
      background: var(--bg3);
      color: var(--accent);
      padding: 8px 14px;
      border: 1px solid var(--border);
      text-align: left;
      font-weight: 600;
    }

    .md td {
      padding: 7px 14px;
      border: 1px solid var(--border);
      color: var(--text2);
    }

    .modal-footer {
      padding: 14px 24px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      align-items: center;
    }

    .modal-footer-left {
      flex: 1;
      font-size: 11px;
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
    }

    .btn {
      padding: 7px 16px;
      border-radius: 6px;
      border: none;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      font-family: 'Inter', system-ui, sans-serif;
    }

    .btn-primary {
      background: var(--accent);
      color: #000;
    }

    .btn-primary:hover {
      background: var(--accent2);
    }

    .btn-secondary {
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text);
    }

    .btn-secondary:hover {
      border-color: var(--border2);
    }

    /* Stats row */
    .stats-row {
      display: flex;
      gap: 20px;
      margin-bottom: 32px;
      flex-wrap: wrap;
    }

    .stat-pill {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 18px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .stat-pill-val {
      font-family: 'JetBrains Mono', monospace;
      font-size: 20px;
      font-weight: 700;
      color: var(--accent2);
    }

    .stat-pill-label {
      font-size: 12px;
      color: var(--muted);
    }

    /* search highlight badge */
    .search-results-badge {
      background: rgba(255, 235, 59, 0.12);
      border: 1px solid rgba(255, 235, 59, 0.3);
      border-radius: 5px;
      padding: 5px 14px;
      font-size: 12px;
      color: var(--yellow);
      font-family: 'JetBrains Mono', monospace;
      display: none;
    }

    .search-results-badge.visible {
      display: inline-block;
    }

    /* ── Target section ── */
    .target-section {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 18px 20px;
      margin-bottom: 36px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .target-field {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1;
      min-width: 200px;
    }

    .target-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .target-input {
      flex: 1;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      padding: 7px 12px;
      font-size: 13px;
      font-family: 'JetBrains Mono', monospace;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .target-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(79, 195, 247, 0.1);
    }

    .target-input::placeholder {
      color: var(--muted);
    }

    .target-divider {
      width: 1px;
      height: 28px;
      background: var(--border);
      flex-shrink: 0;
    }

    @media (max-width: 600px) {
      .target-divider {
        display: none;
      }
    }

    /* ── Service search box ── */
    .service-search-wrap {
      position: relative;
      margin-bottom: 24px;
    }

    .service-search-icon {
      position: absolute;
      left: 13px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 14px;
      pointer-events: none;
      color: var(--muted);
    }

    .service-search-input {
      width: 100%;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 10px 40px 10px 38px;
      font-size: 14px;
      font-family: 'Inter', system-ui, sans-serif;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .service-search-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(79, 195, 247, 0.1);
    }

    .service-search-input::placeholder {
      color: var(--muted);
      font-size: 13px;
    }

    .service-search-clear {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--muted);
      font-size: 13px;
      cursor: pointer;
      padding: 4px 6px;
      border-radius: 4px;
      display: none;
      transition: color 0.15s;
    }

    .service-search-clear:hover {
      color: var(--text);
    }

    .service-search-clear.visible {
      display: block;
    }

    /* ── Services empty state ── */
    .services-empty {
      text-align: center;
      padding: 48px 20px;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      display: flex;
    }

    .services-empty.hidden {
      display: none;
    }

    .services-empty-icon {
      font-size: 40px;
      opacity: 0.25;
      margin-bottom: 4px;
    }

    .services-empty-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--muted);
    }

    .services-empty-hint {
      font-size: 12px;
      color: var(--muted);
      opacity: 0.65;
    }

    .guides-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 14px;
    }

    .guide-card {
      position: relative;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px 20px 16px;
      cursor: pointer;
      transition: border-color 0.2s, transform 0.18s, box-shadow 0.2s;
      overflow: hidden;
    }

    .guide-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 20% 0%, rgba(179, 136, 255, 0.07) 0%, transparent 60%);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .guide-card:hover {
      border-color: var(--purple);
      transform: translateY(-3px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(179, 136, 255, 0.2);
    }

    .guide-card:hover::before {
      opacity: 1;
    }

    .guide-card::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: var(--purple);
      opacity: 0.6;
      transition: opacity 0.2s;
    }

    .guide-card:hover::after {
      opacity: 1;
    }

    .guide-card.hidden {
      display: none;
    }

    .guide-card.search-match {
      border-color: var(--yellow);
      box-shadow: 0 0 0 1px rgba(255, 235, 59, 0.25);
    }

    .guide-card.search-match::after {
      background: var(--yellow);
      opacity: 1;
    }

    .guide-icon {
      font-size: 26px;
      margin-bottom: 10px;
      display: block;
      line-height: 1;
    }

    .guide-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 5px;
      letter-spacing: 0.01em;
    }

    .guide-desc {
      font-size: 12px;
      color: var(--text2);
      line-height: 1.55;
    }

    .guide-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
    }

    .guide-tag {
      display: inline-block;
      background: rgba(179, 136, 255, 0.12);
      border: 1px solid rgba(179, 136, 255, 0.25);
      border-radius: 3px;
      padding: 2px 7px;
      font-size: 10px;
      color: var(--purple);
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .guide-words {
      font-size: 10px;
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
    }

    @media (max-width: 640px) {
      .topbar {
        flex-direction: column;
        height: auto;
        padding: 10px 16px;
        gap: 8px;
      }

      .search-area {
        width: 100%;
        flex: none;
      }

      .main {
        padding: 16px;
      }
    }

    /* ── Search dropdown (external index results) ── */
    .search-dropdown {
      display: none;
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      right: 0;
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: 10px;
      z-index: 200;
      overflow: hidden;
      box-shadow: 0 16px 48px rgba(0, 0, 0, 0.55);
      min-width: 320px;
    }

    .search-dropdown.open {
      display: block;
    }

    .sd-header {
      padding: 8px 14px 6px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .sd-header-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .sd-status {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--muted);
    }

    .sd-status.offline {
      color: var(--red);
    }

    .sd-result {
      display: block;
      padding: 10px 14px;
      text-decoration: none;
      border-bottom: 1px solid var(--border);
      transition: background 0.1s;
    }

    .sd-result:last-child {
      border-bottom: none;
    }

    .sd-result:hover {
      background: var(--bg3);
    }

    .sd-result-top {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 3px;
    }

    .sd-result-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }

    .sd-result-score {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      font-weight: 700;
      background: var(--accent);
      color: #000;
      padding: 1px 6px;
      border-radius: 3px;
      flex-shrink: 0;
    }

    .sd-result-meta {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 4px;
    }

    .sd-result-source {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--muted);
    }

    .sd-result-match {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--purple);
      background: rgba(179, 136, 255, 0.1);
      border: 1px solid rgba(179, 136, 255, 0.2);
      padding: 1px 5px;
      border-radius: 3px;
    }

    .sd-result-local {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--green);
    }

    .sd-result-snippet {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--text2);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .sd-empty {
      padding: 20px 14px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--muted);
      text-align: center;
    }

    .sd-loading {
      padding: 16px 14px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      text-align: center;
      letter-spacing: 0.06em;
    }

    /* ── Index results panel ── */
    .ir-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 12px;
    }

    .ir-card {
      position: relative;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px 18px;
      cursor: pointer;
      text-decoration: none;
      display: block;
      transition: border-color 0.2s, transform 0.18s, box-shadow 0.2s;
      overflow: hidden;
    }

    .ir-card::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: var(--accent);
      opacity: 0.5;
      transition: opacity 0.2s;
    }

    .ir-card.local::after {
      background: var(--green);
    }

    .ir-card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.3);
    }

    .ir-card.local:hover {
      border-color: var(--green);
    }

    .ir-card:hover::after {
      opacity: 1;
    }

    .ir-card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 6px;
    }

    .ir-card-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.3;
      flex: 1;
    }

    .ir-card-score {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      background: var(--accent);
      color: #000;
      padding: 2px 8px;
      border-radius: 4px;
      flex-shrink: 0;
    }

    .ir-card-meta {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }

    .ir-card-source {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--muted);
    }

    .ir-card-match {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--purple);
      background: rgba(179, 136, 255, 0.1);
      border: 1px solid rgba(179, 136, 255, 0.2);
      padding: 1px 6px;
      border-radius: 3px;
    }

    .ir-card-local-badge {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--green);
      background: rgba(0, 230, 118, 0.08);
      border: 1px solid rgba(0, 230, 118, 0.2);
      padding: 1px 6px;
      border-radius: 3px;
    }

    .ir-card-snippet {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11.5px;
      color: var(--text2);
      line-height: 1.55;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .ir-empty {
      grid-column: 1 / -1;
      padding: 48px 0;
      text-align: center;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      color: var(--muted);
    }

    .ir-offline {
      grid-column: 1 / -1;
      padding: 32px 20px;
      background: var(--bg2);
      border: 1px solid rgba(255, 83, 112, 0.3);
      border-radius: 10px;
      text-align: center;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--red);
    }
  </style>
</head>

<body>

  <!-- Top Bar -->
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-logo">
        📖🔍 Methodology Dashboard
      </div>
      <button class="theme-btn" id="themeBtn" onclick="toggleTheme()" title="Toggle light/dark mode">
        <span id="themeIcon">☀️</span>
        <span class="theme-btn-label" id="themeLabel">Light</span>
      </button>
    </div>

    <div class="search-area">
      <!-- Input row -->
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input class="quick-search" id="quickSearch" type="text" placeholder="Search indexed knowledge…"
          autocomplete="off" oninput="onQuickSearch(this.value)">
        <span class="search-kbd">⌘K</span>
        <!-- Search index dropdown (inline under topbar) -->
        <div class="search-dropdown" id="searchDropdown"></div>
      </div>

      <!-- Controls row: scope + fuzzy -->
      <div class="search-controls">
        <div class="search-scope-btns">
          <button class="scope-btn" data-scope="all" onclick="setScope('all', this)" title="Search all sources">✦
            All</button>
          <button class="scope-btn" data-scope="local" onclick="setScope('local', this)"
            title="Search local knowledge base">📁 Local</button>
          <button class="scope-btn" data-scope="online" onclick="setScope('online', this)"
            title="Search online (coming soon)">🌐 Online</button>
        </div>
        <div class="search-divider-dot"></div>
        <span class="fuzzy-label">Fuzzy</span>
        <div class="fuzzy-btns">
          <button class="fuzzy-btn" data-fuzzy="off" onclick="setFuzzy('off', this)">Off</button>
          <button class="fuzzy-btn" data-fuzzy="normal" onclick="setFuzzy('normal', this)">Normal</button>
          <button class="fuzzy-btn" data-fuzzy="prefer" onclick="setFuzzy('prefer', this)">Prefer</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Main -->
  <div class="main">

    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-pill">
        <div class="stat-pill-val" id="statTotal">0</div>
        <div class="stat-pill-label">Services indexed</div>
      </div>
      <!--<div class="stat-pill">
        <div class="stat-pill-val" id="statCats">0</div>
        <div class="stat-pill-label">Categories</div>
      </div> 
      <div class="stat-pill" style="border-color: rgba(0,230,118,0.3);">
        <div class="stat-pill-val" style="color: var(--green);">Local</div>
        <div class="stat-pill-label">Knowledge base</div>
      </div>
    -->
      <div class="stat-pill" style="border-color: rgba(179,136,255,0.3);">
        <div class="stat-pill-val" style="color: var(--purple);" id="statMeth">0</div>
        <div class="stat-pill-label">Tactical guides</div>
      </div>
      <span class="search-results-badge" id="searchBadge"></span>
    </div>

    <!-- Target -->
    <div class="section-header" style="margin-bottom: 12px;">
      <span class="section-title">Target</span>
      <div class="section-line"></div>
    </div>
    <div class="target-section">
      <div class="target-field">
        <span class="target-label">IP</span>
        <input class="target-input" id="targetIP" type="text" placeholder="192.168.1.1" spellcheck="false"
          autocomplete="off">
      </div>
      <div class="target-divider"></div>
      <div class="target-field">
        <span class="target-label">Domain</span>
        <input class="target-input" id="targetDomain" type="text" placeholder="corp.local" spellcheck="false"
          autocomplete="off">
      </div>
    </div>

    <!-- ── Index search results panel (replaces content when searching) ── -->
    <div id="indexResultsPanel" style="display:none; margin-bottom: 12px;">
      <div class="section-header" style="margin-bottom: 16px;">
        <span class="section-title" id="indexResultsTitle">Search Results</span>
        <div class="section-line"></div>
        <span class="section-count" id="indexResultsCount">—</span>
        <button onclick="clearGlobalSearch()" style="
        background:var(--bg3); border:1px solid var(--border2); border-radius:5px;
        color:var(--muted); padding:3px 10px; font-size:11px; cursor:pointer;
        font-family:'JetBrains Mono',monospace; transition:all 0.15s; margin-left:8px;
      " onmouseenter="this.style.color='var(--text)'" onmouseleave="this.style.color='var(--muted)'">✕ Clear</button>
      </div>
      <div id="indexResultsList"></div>
    </div>

    <!-- ── Normal content (hidden during search) ── -->
    <div id="normalContent">

      <!-- Filter bar -->
      <div class="section-header">
        <span class="section-title">Services</span>
        <div class="section-line"></div>
        <span class="section-count" id="visibleCount">—</span>
      </div>

      <div class="filter-bar" id="filterBar">
        <button class="filter-tag active" data-cat="all" onclick="filterBy('all', this)">All</button>
      </div>

      <div class="service-search-wrap">
        <span class="service-search-icon">🔍</span>
        <input class="service-search-input" id="serviceSearch" type="text" placeholder="Search services…"
          autocomplete="off" spellcheck="false" oninput="onServiceSearch(this.value)">
        <button class="service-search-clear" id="serviceSearchClear" onclick="clearServiceSearch()"
          title="Clear">✕</button>
      </div>

      <!-- Grid -->
      <div class="services-grid" id="servicesGrid"></div>
      <div class="services-empty" id="servicesEmpty">
        <div class="services-empty-icon">🔍</div>
        <div class="services-empty-title">Search for a service above</div>
        <div class="services-empty-hint">Type a name, port number, or category to find relevant cheatsheets</div>
      </div>

      <!-- ── Tactical Guides ── -->
      <div style="margin-top: 30px;">
        <div class="section-header">
          <span class="section-title">Tactical Guides</span>
          <div class="section-line"></div>
          <span class="section-count" id="methCount">—</span>
        </div>

        <div class="filter-bar" id="methFilterBar">
          <button class="filter-tag active" data-cat="all" onclick="methFilterBy('all', this)">All</button>
        </div>

        <div class="guides-grid" id="guidesGrid"></div>
      </div>

    </div><!-- end #normalContent -->

  </div>

  <!-- Modal -->
  <div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
    <div class="modal-box">
      <div class="modal-head">
        <span class="modal-icon" id="modalIcon">📄</span>
        <div class="modal-head-info">
          <div class="modal-title" id="modalTitle">Loading…</div>
          <div class="modal-meta" id="modalMeta"></div>
        </div>
      </div>
      <div class="modal-body">
        <div class="md" id="modalContent">Loading…</div>
      </div>
      <div class="modal-footer">
        <div class="modal-footer-left" id="modalFile"></div>
        <button class="btn btn-secondary" onclick="closeModalDirect()">Close</button>
      </div>
    </div>
  </div>

  <script>
    // ────────────────────────────────────────────────
    // Theme
    // ────────────────────────────────────────────────
    function applyTheme(theme) {
      if (theme === 'light') {
        document.documentElement.setAttribute('data-theme', 'light');
        document.getElementById('themeIcon').textContent = '🌙';
        document.getElementById('themeLabel').textContent = 'Dark';
      } else {
        document.documentElement.removeAttribute('data-theme');
        document.getElementById('themeIcon').textContent = '☀️';
        document.getElementById('themeLabel').textContent = 'Light';
      }
    }
    function toggleTheme() {
      const next = document.documentElement.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
      localStorage.setItem('dash-theme', next);
      applyTheme(next);
    }
    applyTheme(localStorage.getItem('dash-theme') || 'dark');

    // ────────────────────────────────────────────────
    // SERVICES is loaded from /api/services at runtime
    // METHODOLOGIES is loaded from /api/methodologies at runtime
    // ────────────────────────────────────────────────
    let SERVICES = [];
    let METHODOLOGIES = [];

    // ────────────────────────────────────────────────
    // State
    // ────────────────────────────────────────────────
    let activeCategory = 'all';
    let activeScope = localStorage.getItem('dash-search-scope') || 'all';
    let searchQuery = '';
    let fuzzyMode = localStorage.getItem('dash-search-fuzzy') || 'off';

    // Accent colours cycled for cards that don't have one from the server
    const ACCENT_CYCLE = [
      '#4fc3f7', '#00e676', '#ffab40', '#b388ff',
      '#ff5370', '#ffeb3b', '#00e5ff', '#69f0ae',
    ];
    function accentFor(index) { return ACCENT_CYCLE[index % ACCENT_CYCLE.length]; }

    // ────────────────────────────────────────────────
    // Init — fetch from API
    // ────────────────────────────────────────────────
    async function init() {
      try {
        const res = await fetch('/api/services');
        const data = await res.json();
        SERVICES = data.services || [];
      } catch (err) {
        console.error('Failed to load /api/services:', err);
        showError('Could not reach the server. Is it running?');
        return;
      }

      if (SERVICES.length === 0) {
        showError('No .md files found in knowledge_base/. Add some and restart the server.');
        return;
      }

      // Build category filter buttons
      const cats = ['all', ...new Set(SERVICES.map(s => s.category))];
      const fb = document.getElementById('filterBar');
      fb.innerHTML = '';
      cats.forEach(cat => {
        const b = document.createElement('button');
        b.className = 'filter-tag' + (cat === 'all' ? ' active' : '');
        b.dataset.cat = cat;
        b.textContent = cat === 'all' ? 'All' : cat;
        b.onclick = () => filterBy(cat, b);
        fb.appendChild(b);
      });

      // Stats
      if (document.getElementById('statTotal')) document.getElementById('statTotal').textContent = SERVICES.length;
      if (document.getElementById('statCats')) document.getElementById('statCats').textContent = cats.length - 1;

      renderGrid();

      // Load methodologies in parallel
      initMethodologies();
    }

    // ────────────────────────────────────────────────
    // Methodologies
    // ────────────────────────────────────────────────
    let activeMethCategory = 'all';

    async function initMethodologies() {
      try {
        const res = await fetch('/api/methodologies');
        const data = await res.json();
        METHODOLOGIES = data.guides || [];
      } catch (err) {
        console.error('Failed to load /api/methodologies:', err);
        return;
      }

      if (document.getElementById('statMeth')) document.getElementById('statMeth').textContent = METHODOLOGIES.length;

      if (METHODOLOGIES.length === 0) {
        document.getElementById('guidesGrid').innerHTML =
          `<div style="grid-column:1/-1;color:var(--muted);font-family:'JetBrains Mono',monospace;
        font-size:12px;padding:24px 0;">No .md files found in methodologies/. Drop some in and the server will pick them up automatically.</div>`;
        return;
      }

      // Category filters for guides
      const cats = ['all', ...new Set(METHODOLOGIES.map(g => g.category))];
      const fb = document.getElementById('methFilterBar');
      fb.innerHTML = '';
      cats.forEach(cat => {
        const b = document.createElement('button');
        b.className = 'filter-tag' + (cat === 'all' ? ' active' : '');
        b.dataset.cat = cat;
        b.textContent = cat === 'all' ? 'All' : cat;
        b.onclick = () => methFilterBy(cat, b);
        fb.appendChild(b);
      });

      if (document.getElementById('methCount')) document.getElementById('methCount').textContent = `${METHODOLOGIES.length} guides`;
      methRenderGrid();
    }

    function methRenderGrid() {
      const grid = document.getElementById('guidesGrid');
      grid.innerHTML = '';
      let visible = 0;
      const q = searchQuery.toLowerCase();

      METHODOLOGIES.forEach(guide => {
        const matchesCat = activeMethCategory === 'all' || guide.category === activeMethCategory;
        const matchesSearch = !q ||
          guide.name.toLowerCase().includes(q) ||
          (guide.description || '').toLowerCase().includes(q) ||
          guide.category.toLowerCase().includes(q);

        const card = document.createElement('div');
        card.className = 'guide-card' +
          (!matchesCat || !matchesSearch ? ' hidden' : '') +
          (matchesSearch && q ? ' search-match' : '');
        card.dataset.id = guide.id;
        card.innerHTML = `
      <span class="guide-icon">${guide.icon || '📋'}</span>
      <div class="guide-name">${esc(guide.name)}</div>
      <div class="guide-desc">${esc(guide.description || '')}</div>
      <div class="guide-meta">
        <span class="guide-tag">${esc(guide.category)}</span>
        <span class="guide-words">${guide.wordCount || 0} words</span>
      </div>
    `;
        card.onclick = () => openMethModal(guide.id);
        grid.appendChild(card);
        if (matchesCat && matchesSearch) visible++;
      });

      if (document.getElementById('methCount')) document.getElementById('methCount').textContent = `${visible} guide${visible !== 1 ? 's' : ''}`;
    }

    function methFilterBy(cat, btn) {
      activeMethCategory = cat;
      document.querySelectorAll('#methFilterBar .filter-tag').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      methRenderGrid();
    }

    async function openMethModal(id) {
      const guide = METHODOLOGIES.find(g => g.id === id);
      if (!guide) return;

      document.getElementById('modalIcon').textContent = guide.icon || '📋';
      document.getElementById('modalTitle').textContent = guide.name;
      document.getElementById('modalMeta').textContent = `Category: ${guide.category}  ·  ${guide.wordCount} words`;
      document.getElementById('modalFile').textContent = `📁 methodologies/${guide.file}`;
      document.getElementById('modalContent').innerHTML =
        `<p style="color:var(--muted);text-align:center;padding:40px 0;">Loading…</p>`;
      document.getElementById('modalOverlay').classList.add('open');
      document.body.style.overflow = 'hidden';

      try {
        const res = await fetch(`/api/methodology/${encodeURIComponent(id)}`);
        const data = await res.json();
        if (data.error) throw new Error(data.error);
        document.getElementById('modalContent').innerHTML = data.html;
      } catch (err) {
        document.getElementById('modalContent').innerHTML =
          `<p style="color:var(--red);">Failed to load content: ${err.message}</p>`;
      }
    }

    function showError(msg) {
      document.getElementById('servicesGrid').innerHTML =
        `<div style="grid-column:1/-1;color:var(--red);font-family:'JetBrains Mono',monospace;
      font-size:13px;padding:40px 0;text-align:center;">⚠️  ${msg}</div>`;
    }

    // ────────────────────────────────────────────────
    // Render grid — cards only shown when query is active
    // ────────────────────────────────────────────────
    let serviceQuery = '';

    function renderGrid() {
      const grid = document.getElementById('servicesGrid');
      const empty = document.getElementById('servicesEmpty');
      grid.innerHTML = '';
      let visible = 0;
      const q = serviceQuery.toLowerCase();

      // No query → show empty state, hide grid
      if (!q) {
        grid.style.display = 'none';
        empty.classList.remove('hidden');
        if (document.getElementById('visibleCount')) document.getElementById('visibleCount').textContent = `${SERVICES.length} total`;
        if (document.getElementById('searchBadge')) document.getElementById('searchBadge').classList.remove('visible');
        return;
      }

      grid.style.display = 'grid';
      empty.classList.add('hidden');

      SERVICES.forEach((svc, idx) => {
        const matchesCat = activeCategory === 'all' || svc.category === activeCategory;
        const matchesSearch =
          svc.name.toLowerCase().includes(q) ||
          (svc.description || '').toLowerCase().includes(q) ||
          svc.category.toLowerCase().includes(q) ||
          svc.port.toLowerCase().includes(q);

        if (!matchesCat || !matchesSearch) return;

        const accent = accentFor(idx);
        const card = document.createElement('div');
        card.className = 'service-card search-match';
        card.style.setProperty('--card-accent', accent);
        card.dataset.id = svc.id;
        card.innerHTML = `
      <span class="card-icon">${svc.icon || '📄'}</span>
      <div class="card-port">${svc.port || '—'}</div>
      <div class="card-name">${esc(svc.name)}</div>
      <div class="card-desc">${esc(svc.description || '')}</div>
      <span class="card-tag">${esc(svc.category)}</span>
    `;
        card.onclick = () => openModal(svc.id);
        grid.appendChild(card);
        visible++;
      });

      if (document.getElementById('visibleCount')) document.getElementById('visibleCount').textContent = `${visible} result${visible !== 1 ? 's' : ''}`;

      if (visible === 0) {
        grid.style.display = 'none';
        empty.classList.remove('hidden');
        document.getElementById('servicesEmpty').querySelector('.services-empty-title').textContent =
          `No results for "${serviceQuery}"`;
        document.getElementById('servicesEmpty').querySelector('.services-empty-hint').textContent =
          'Try a different keyword, port, or category';
      } else {
        document.getElementById('servicesEmpty').querySelector('.services-empty-title').textContent =
          'Search for a service above';
        document.getElementById('servicesEmpty').querySelector('.services-empty-hint').textContent =
          'Type a name, port number, or category to find relevant cheatsheets';
      }
    }

    function onServiceSearch(val) {
      serviceQuery = val;
      const clearBtn = document.getElementById('serviceSearchClear');
      clearBtn.classList.toggle('visible', val.length > 0);
      renderGrid();
    }

    function clearServiceSearch() {
      serviceQuery = '';
      document.getElementById('serviceSearch').value = '';
      document.getElementById('serviceSearchClear').classList.remove('visible');
      renderGrid();
      document.getElementById('serviceSearch').focus();
    }

    function filterBy(cat, btn) {
      activeCategory = cat;
      document.querySelectorAll('.filter-tag').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderGrid();
    }

    function setScope(scope, btn) {
      activeScope = scope;
      localStorage.setItem('dash-search-scope', scope);
      document.querySelectorAll('.scope-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const input = document.getElementById('quickSearch');
      if (scope === 'online') input.placeholder = '🌐 Online search coming soon…';
      else if (scope === 'all') input.placeholder = 'Search all indexed sources…';
      else input.placeholder = 'Search local knowledge base…';
      // Re-run if query exists
      const q = document.getElementById('quickSearch').value.trim();
      if (q.length >= 2) runIndexSearch(q);
    }

    // ────────────────────────────────────────────────
    // Fuzzy mode
    // ────────────────────────────────────────────────
    function setFuzzy(mode, btn) {
      fuzzyMode = mode;
      localStorage.setItem('dash-search-fuzzy', mode);
      document.querySelectorAll('.fuzzy-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      // Re-run if there's an active query
      const q = document.getElementById('quickSearch').value.trim();
      if (q.length >= 2) runIndexSearch(q);
    }

    // ────────────────────────────────────────────────
    // Global search — shows results in place of Services/Guides
    // ────────────────────────────────────────────────
    function showIndexResults(show) {
      document.getElementById('indexResultsPanel').style.display = show ? 'block' : 'none';
      document.getElementById('normalContent').style.display = show ? 'none' : 'block';
    }

    function clearGlobalSearch() {
      document.getElementById('quickSearch').value = '';
      showIndexResults(false);
      closeSearchDropdown();
    }

    function onQuickSearch(val) {
      searchQuery = val;
      if (METHODOLOGIES.length > 0) methRenderGrid();

      clearTimeout(onQuickSearch._timer);
      if (val.trim().length < 2) {
        closeSearchDropdown();
        showIndexResults(false);
        return;
      }
      onQuickSearch._timer = setTimeout(() => runIndexSearch(val.trim()), 320);
    }

    // ────────────────────────────────────────────────
    // External search index integration
    // POST /api/search-proxy → search indexer
    // ────────────────────────────────────────────────
    async function runIndexSearch(query) {
      // Show loading state in the main content area
      showIndexResults(true);
      document.getElementById('indexResultsTitle').textContent = `Results — "${query}"`;
      document.getElementById('indexResultsCount').textContent = 'searching…';
      document.getElementById('indexResultsList').innerHTML =
        `<div class="ir-grid"><div class="ir-empty">⏳ querying index…</div></div>`;

      try {
        const res = await fetch('/api/search-proxy', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ query, fuzzyMode, scope: activeScope }),
        });
        const data = await res.json();
        renderIndexResults(query, data.results || [], data.offline || false);
      } catch (_) {
        renderIndexResults(query, [], true);
      }
    }

    function renderIndexResults(query, results, offline) {
      const list = document.getElementById('indexResultsList');
      const count = document.getElementById('indexResultsCount');

      if (offline) {
        count.textContent = 'indexer offline';
        list.innerHTML = `<div class="ir-grid"><div class="ir-offline">
      ⚠ Search indexer not reachable — start it on port 3001 to enable live search.
    </div></div>`;
        return;
      }

      count.textContent = results.length === 0
        ? 'no results'
        : `${results.length} result${results.length !== 1 ? 's' : ''}`;

      if (results.length === 0) {
        list.innerHTML = `<div class="ir-grid"><div class="ir-empty">No results found for "<strong>${esc(query)}</strong>"</div></div>`;
        return;
      }

      const cardsHtml = results.map((r, i) => {
        const score = typeof r.relevance_score === 'number' ? r.relevance_score.toFixed(1) : r.relevance_score;
        const snippet = r.snippet ? (typeof r.snippet === 'object' ? r.snippet.text : r.snippet) : '';
        const trimmed = snippet ? snippet.replace(/\s+/g, ' ').trim() : '';
        const isLocal = r.is_local;
        const href = isLocal ? '#' : (r.url || '#');

        return `
      <a class="ir-card${isLocal ? ' local' : ''}"
         href="${esc(href)}"
         ${!isLocal ? 'target="_blank" rel="noopener"' : ''}
         data-local="${isLocal ? '1' : '0'}"
         data-filepath="${esc(r.file_path || '')}"
         data-title="${esc(r.title || '')}"
         data-idx="${i}">
        <div class="ir-card-top">
          <div class="ir-card-title">${esc(r.title || r.page_name || 'Untitled')}</div>
          <span class="ir-card-score">${score}</span>
        </div>
        <div class="ir-card-meta">
          <span class="ir-card-source">${esc(r.source_name || '')}</span>
          ${r.match_type ? `<span class="ir-card-match">${esc(r.match_type)}</span>` : ''}
          ${isLocal ? `<span class="ir-card-local-badge">📁 local</span>` : ''}
        </div>
        ${trimmed ? `<div class="ir-card-snippet">${esc(trimmed)}</div>` : ''}
      </a>`;
      }).join('');

      list.innerHTML = `<div class="ir-grid">${cardsHtml}</div>`;

      // Wire local-file cards to open preview modal
      list.querySelectorAll('.ir-card[data-local="1"]').forEach(el => {
        el.addEventListener('click', e => {
          e.preventDefault();
          openIndexPreviewModal(el.dataset.title, el.dataset.filepath);
        });
      });
    }

    function closeSearchDropdown() {
      const dd = document.getElementById('searchDropdown');
      if (dd) dd.classList.remove('open');
    }

    // Open a file from the search index in the modal via /api/preview
    async function openIndexPreviewModal(title, filePath) {
      document.getElementById('modalIcon').textContent = '🔍';
      document.getElementById('modalTitle').textContent = title || 'Preview';
      document.getElementById('modalMeta').textContent = 'Search index result';
      document.getElementById('modalFile').textContent = `📁 ${filePath}`;
      document.getElementById('modalContent').innerHTML =
        `<p style="color:var(--muted);text-align:center;padding:40px 0;">Loading…</p>`;
      document.getElementById('modalOverlay').classList.add('open');
      document.body.style.overflow = 'hidden';

      try {
        const res = await fetch(`/api/preview?file=${encodeURIComponent(filePath)}`);
        const data = await res.json();
        if (data.error) throw new Error(data.error);
        document.getElementById('modalContent').innerHTML = data.html || `<pre>${esc(data.raw || '')}</pre>`;
      } catch (err) {
        document.getElementById('modalContent').innerHTML =
          `<p style="color:var(--red);">Could not load preview: ${err.message}</p>`;
      }
    }

    // ────────────────────────────────────────────────
    // Modal — fetches full content from /api/service/:id
    // ────────────────────────────────────────────────
    async function openModal(id) {
      const svc = SERVICES.find(s => s.id === id);
      if (!svc) return;

      // Show modal immediately with loading state
      document.getElementById('modalIcon').textContent = svc.icon || '📄';
      document.getElementById('modalTitle').textContent = svc.name;
      document.getElementById('modalMeta').textContent = `Port: ${svc.port}  ·  Category: ${svc.category}`;
      document.getElementById('modalFile').textContent = `📁 knowledge_base/${svc.file}`;
      document.getElementById('modalContent').innerHTML =
        `<p style="color:var(--muted);text-align:center;padding:40px 0;">Loading…</p>`;
      document.getElementById('modalOverlay').classList.add('open');
      document.body.style.overflow = 'hidden';

      // Fetch rendered HTML from server (uses marked on the server side)
      try {
        const res = await fetch(`/api/service/${encodeURIComponent(id)}`);
        const data = await res.json();
        if (data.error) throw new Error(data.error);
        document.getElementById('modalContent').innerHTML = data.html;
      } catch (err) {
        document.getElementById('modalContent').innerHTML =
          `<p style="color:var(--red);">Failed to load content: ${err.message}</p>`;
      }
    }

    function closeModal(e) {
      if (e.target === document.getElementById('modalOverlay')) closeModalDirect();
    }
    function closeModalDirect() {
      document.getElementById('modalOverlay').classList.remove('open');
      document.body.style.overflow = '';
    }

    // ────────────────────────────────────────────────
    // Utility
    // ────────────────────────────────────────────────
    function esc(str) {
      return String(str)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    // ────────────────────────────────────────────────
    // Target — persist IP + Domain in localStorage
    // ────────────────────────────────────────────────
    function initTarget() {
      const ipEl = document.getElementById('targetIP');
      const domainEl = document.getElementById('targetDomain');
      ipEl.value = localStorage.getItem('dash-target-ip') || '';
      domainEl.value = localStorage.getItem('dash-target-domain') || '';
      ipEl.addEventListener('input', () => localStorage.setItem('dash-target-ip', ipEl.value));
      domainEl.addEventListener('input', () => localStorage.setItem('dash-target-domain', domainEl.value));
    }

    // ────────────────────────────────────────────────
    // Keyboard shortcuts
    // ────────────────────────────────────────────────
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') {
        if (document.getElementById('modalOverlay').classList.contains('open')) {
          closeModalDirect(); return;
        }
        const q = document.getElementById('quickSearch').value;
        if (q) { clearGlobalSearch(); return; }
        clearServiceSearch();
        return;
      }
      if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
        e.preventDefault();
        document.getElementById('quickSearch').focus();
      }
    });

    // Close dropdown when clicking outside search area
    document.addEventListener('click', e => {
      const wrap = document.querySelector('.search-wrap');
      if (wrap && !wrap.contains(e.target)) closeSearchDropdown();
    });

    function initSettings() {
      // Apply UI state for scope
      const scopeBtn = document.querySelector(`.scope-btn[data-scope="${activeScope}"]`);
      if (scopeBtn) setScope(activeScope, scopeBtn);

      // Apply UI state for fuzzy
      const fuzzyBtn = document.querySelector(`.fuzzy-btn[data-fuzzy="${fuzzyMode}"]`);
      if (fuzzyBtn) {
        document.querySelectorAll('.fuzzy-btn').forEach(b => b.classList.remove('active'));
        fuzzyBtn.classList.add('active');
      }
    }

    init();
    initTarget();
    initSettings();
  </script>
</body>

</html>
